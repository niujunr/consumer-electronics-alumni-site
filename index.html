        ["A类实名", rowsAsObjects.length, "近24个月报道，含前版严格样本和扩展母公司新增样本"],
        ["技术背景", backgroundCounts["技术背景"], "研发、算法、工程、芯片、科学家、技术产品等"],
        ["市场背景", backgroundCounts["市场背景"], "CMO、市场、品牌、渠道、营销等"],
        ["其他背景", backgroundCounts["其他背景"], "产品线、供应链、战略、综合高管或岗位未披露"],
        ["候选句库", snippets.length, "自动抽取，供继续人工扩展"]
      ];
      $("metrics").innerHTML = metrics.map(([label, value, note]) => `
        <article class="metric">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div class="metric-value">${escapeHtml(value)}</div>
          <div class="metric-note">${escapeHtml(note)}</div>
        </article>`).join("");
      $("parentPool").textContent = PAYLOAD.parentPool.join("、");
    }

    function initFilters() {
      const parentOptions = ["全部原大厂", ...uniq(rowsAsObjects.map((row) => row["原大厂"]))];
      const backgroundOptions = ["全部背景", "技术背景", "市场背景", "其他背景"];
      const fundingRoundOptions = ["全部融资轮次", ...uniq(rowsAsObjects.map((row) => row["融资轮次"]))];
      const roleOptions = ["全部角色", "创始人", "联合创始人", "CEO", "CTO"];
      const confidenceOptions = ["全部置信度", ...uniq(rowsAsObjects.map((row) => row["置信度"]))];
      const mediaOptions = ["全部媒体", ...uniq(rowsAsObjects.map((row) => row["媒体/来源类型"].split("/")[0]))];
      $("parentFilter").innerHTML = parentOptions.map((x) => `<option>${escapeHtml(x)}</option>`).join("");
      $("backgroundFilter").innerHTML = backgroundOptions.map((x) => `<option>${escapeHtml(x)}</option>`).join("");
      $("fundingRoundFilter").innerHTML = fundingRoundOptions.map((x) => `<option>${escapeHtml(x)}</option>`).join("");
      $("roleFilter").innerHTML = roleOptions.map((x) => `<option>${escapeHtml(x)}</option>`).join("");
      $("confidenceFilter").innerHTML = confidenceOptions.map((x) => `<option>${escapeHtml(x)}</option>`).join("");
      $("mediaFilter").innerHTML = mediaOptions.map((x) => `<option>${escapeHtml(x)}</option>`).join("");
    }

    function activeColumns() {
      return state.tab === "names" ? nameColumns : snippetColumns;
    }

    function activeRows() {
      if (state.tab === "snippets") {
        const query = state.query.trim().toLowerCase();
        return snippets
          .filter((row) => !query || cellText(row, snippetColumns).includes(query))
          .sort((a, b) => String(b["日期"]).localeCompare(String(a["日期"])));
      }
      const query = state.query.trim().toLowerCase();
      return rowsAsObjects
        .filter((row) => !query || cellText(row, nameColumns).includes(query))
        .filter((row) => state.parent === "全部原大厂" || row["原大厂"] === state.parent)
        .filter((row) => state.background === "全部背景" || row["背景分类"] === state.background)
        .filter((row) => state.fundingRound === "全部融资轮次" || row["融资轮次"] === state.fundingRound)
        .filter((row) => state.role === "全部角色" || String(row["当前职务"]).includes(state.role))
        .filter((row) => state.confidence === "全部置信度" || row["置信度"] === state.confidence)
        .filter((row) => state.media === "全部媒体" || String(row["媒体/来源类型"]).startsWith(state.media))
        .sort((a, b) => {
          const key = state.sortKey;
          return String(a[key] ?? "").localeCompare(String(b[key] ?? ""), "zh-Hans-CN") * state.sortDir;
        });
    }

    function render() {
      const cols = activeColumns();
      const rows = activeRows();
      $("count").textContent = `${state.tab === "names" ? "实名名单" : "候选句库"}：${rows.length} 条`;
      $("sortLabel").textContent = state.tab === "names" ? `排序：${state.sortKey} ${state.sortDir > 0 ? "升序" : "降序"}` : "按日期降序";
      $("toolbar").style.gridTemplateColumns = state.tab === "names" ? "" : "minmax(260px, 1fr) auto";
      ["parentFilter", "backgroundFilter", "fundingRoundFilter", "roleFilter", "confidenceFilter", "mediaFilter"].forEach((id) => { $(id).style.display = state.tab === "names" ? "" : "none"; });
      const head = "<thead><tr>" + cols.map((col) => `<th data-key="${col}">${col}</th>`).join("") + "</tr></thead>";
      const body = rows.length ? "<tbody>" + rows.map((row) => "<tr>" + cols.map((col) => renderCell(col, row[col])).join("") + "</tr>").join("") + "</tbody>" : '<tbody><tr><td colspan="' + cols.length + '">没有匹配结果</td></tr></tbody>';
      $("table").innerHTML = head + body;
      document.querySelectorAll("th").forEach((th) => th.addEventListener("click", () => {
        if (state.tab !== "names") return;
        const key = th.dataset.key;
        if (state.sortKey === key) state.sortDir *= -1;
        else { state.sortKey = key; state.sortDir = 1; }
        render();
      }));
    }

    function renderCell(col, value) {
      const text = value == null ? "" : String(value);
      const safe = escapeHtml(text);
      if (col === "姓名") return `<td><span class="name">${safe}</span></td>`;
      if (col === "原大厂" || col === "原大厂池") return `<td><span class="pill company">${safe}</span></td>`;
      if (col === "背景分类") {
        const klass = text === "技术背景" ? "tech" : text === "市场背景" ? "market" : "other";
        return `<td><span class="pill ${klass}">${safe}</span></td>`;
      }
      if (col === "置信度") return `<td><span class="pill ${text === "高" ? "high" : "mid"}">${safe}</span></td>`;
      if (col === "来源URL" || col === "URL") return `<td><a href="${safe}" target="_blank" rel="noreferrer">${safe}</a></td>`;
      return `<td>${safe}</td>`;
    }

    function downloadCsv() {
      const cols = activeColumns();
      const rows = activeRows();
      const csv = [cols, ...rows.map((row) => cols.map((col) => row[col] ?? ""))].map((line) => line.map(csvEscape).join(",")).join("\n") + "\n";
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = state.tab === "names" ? "expanded_a_recent_names.csv" : "expanded_candidate_snippets.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".tab").forEach((btn) => btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
      btn.classList.add("active");
      state.tab = btn.dataset.tab;
      render();
    }));
    $("search").addEventListener("input", (e) => { state.query = e.target.value; render(); });
    $("parentFilter").addEventListener("change", (e) => { state.parent = e.target.value; render(); });
    $("backgroundFilter").addEventListener("change", (e) => { state.background = e.target.value; render(); });
    $("fundingRoundFilter").addEventListener("change", (e) => { state.fundingRound = e.target.value; render(); });
    $("roleFilter").addEventListener("change", (e) => { state.role = e.target.value; render(); });
    $("confidenceFilter").addEventListener("change", (e) => { state.confidence = e.target.value; render(); });
    $("mediaFilter").addEventListener("change", (e) => { state.media = e.target.value; render(); });
    $("downloadBtn").addEventListener("click", downloadCsv);

    initMetrics();
    initFilters();
    render();
  </script>
</body>
</html>
