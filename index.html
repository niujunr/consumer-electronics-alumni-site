    function initMetrics(){const m=[["A类确认",people.length,"已有人名、项目、原大厂经历和原文链接"],["B类候选",projects.filter(r=>r["线索等级"].startsWith("B")).length,"含项目优先补漏候选"],["补漏候选",PAYLOAD.meta.rescueCandidates||0,"项目/产品已露出，待补实名"],["母公司池",parents.length,"已扩展为新硬件大厂池"],["待自动补证",projects.filter(needsQueue).length,"由系统继续查，不是人工待办"]];$("metrics").innerHTML=m.map(([a,b,c])=>`<article class="metric"><div class="metric-label">${esc(a)}</div><div class="metric-value">${esc(b)}</div><div class="metric-note">${esc(c)}</div></article>`).join("")}
    function initFilters(){
      const pAll=[...projects,...people];
      const sourceOptions=uniq(pAll.map(r=>r["媒体/来源"]||r["媒体/来源类型"]).map(x=>String(x||"").split("/")[0]));
      const splitTerms=(v)=>String(v||"").split(/[、,/]/).map(x=>x.trim()).filter(Boolean);
      const parentOptions=uniq([...projects.flatMap(r=>splitTerms(r["疑似原大厂"])),...people.flatMap(r=>splitTerms(r["原大厂"]))]);
      $("levelFilter").innerHTML=["全部层级","A类已入主表","A类自动补全","B类高可信候选","B类团队背景候选","C类项目线索"].map(x=>`<option>${esc(x)}</option>`).join("");
      $("directionFilter").innerHTML=["全部方向",...uniq(pAll.map(r=>r["方向"]||r["扩展方向"]))].map(x=>`<option>${esc(x)}</option>`).join("");
      $("statusFilter").innerHTML=["全部状态",...uniq(projects.map(r=>r["线索状态"]))].map(x=>`<option>${esc(x)}</option>`).join("");
      $("sourceFilter").innerHTML=["全部来源",...sourceOptions].map(x=>`<option>${esc(x)}</option>`).join("");
      $("parentFilter").innerHTML=["全部母公司",...parentOptions].map(x=>`<option>${esc(x)}</option>`).join("");
    }
    function activeRows(){let rows; if(state.tab==="people") rows=people; else if(state.tab==="projects") rows=projects; else if(state.tab==="queue") rows=projects.filter(needsQueue); else if(state.tab==="parents") rows=parents; else rows=media; const cols=columns[state.tab]; const q=state.query.trim().toLowerCase(); rows=rows.filter(r=>!q||textOf(r,cols).includes(q)); if(["projects","queue"].includes(state.tab)){rows=rows.filter(r=>state.level==="全部层级"||r["线索等级"]===state.level); rows=rows.filter(r=>state.direction==="全部方向"||r["方向"]===state.direction); rows=rows.filter(r=>state.status==="全部状态"||r["线索状态"]===state.status); rows=rows.filter(r=>state.source==="全部来源"||String(r["媒体/来源"]).startsWith(state.source)); rows=rows.filter(r=>state.parent==="全部母公司"||String(r["疑似原大厂"]).includes(state.parent));} if(state.tab==="people"){rows=rows.filter(r=>state.level==="全部层级"||r["漏斗层级"]===state.level); rows=rows.filter(r=>state.direction==="全部方向"||r["扩展方向"]===state.direction); rows=rows.filter(r=>state.source==="全部来源"||String(r["媒体/来源类型"]).startsWith(state.source)); rows=rows.filter(r=>state.parent==="全部母公司"||String(r["原大厂"]).includes(state.parent));} return rows.sort((a,b)=>String(a[state.sortKey]??"").localeCompare(String(b[state.sortKey]??""),"zh-Hans-CN")*state.sortDir)}
    function render(){const cols=columns[state.tab]; const rows=activeRows(); $("count").textContent={people:"A类确认人物",projects:"发现漏斗",queue:"待自动补证",parents:"母公司池",media:"媒体池"}[state.tab]+"："+rows.length+" 条"; $("sortLabel").textContent=["people","projects","queue"].includes(state.tab)?`排序：${state.sortKey} ${state.sortDir>0?"升序":"降序"}`:""; const filterIds=["levelFilter","directionFilter","statusFilter","sourceFilter","parentFilter"]; filterIds.forEach(id=>{$(id).style.display=["parents","media"].includes(state.tab)?"none":""}); $("toolbar").style.gridTemplateColumns=["parents","media"].includes(state.tab)?"minmax(260px,1fr) auto":""; const head="<thead><tr>"+cols.map(c=>`<th data-key="${esc(c)}">${esc(c)}</th>`).join("")+"</tr></thead>"; const body=rows.length?"<tbody>"+rows.map(r=>"<tr>"+cols.map(c=>cell(c,r[c])).join("")+"</tr>").join("")+"</tbody>":`<tbody><tr><td colspan="${cols.length}">没有匹配结果</td></tr></tbody>`; $("table").innerHTML=head+body; document.querySelectorAll("th").forEach(th=>th.addEventListener("click",()=>{if(!["people","projects","queue"].includes(state.tab))return; const k=th.dataset.key; if(state.sortKey===k)state.sortDir*=-1; else{state.sortKey=k;state.sortDir=1} render()}))}
    function cell(col,val){const s=String(val??""); const safe=esc(s); if(col==="姓名")return`<td><span class="name">${safe}</span></td>`; if(col==="线索等级"||col==="漏斗层级"){const klass=s.startsWith("A")?"a":s.startsWith("B")?"b":"c";return`<td><span class="pill ${klass}">${safe}</span></td>`;} if(col==="疑似原大厂"||col==="原大厂"||col==="命中母公司")return`<td><span class="pill company">${safe}</span></td>`; if(col==="线索状态"&&s!=="已入实名主表")return`<td><span class="pill bad">${safe}</span></td>`; if((col==="来源URL"||col==="原文链接")&&s)return`<td><a class="source-link" href="${safe}" title="${safe}" target="_blank" rel="noreferrer">打开原文</a></td>`; return`<td>${safe}</td>`}
    function downloadCsv(){const cols=columns[state.tab]; const rows=activeRows(); const csv=[cols,...rows.map(r=>cols.map(c=>r[c]??""))].map(line=>line.map(csvEsc).join(",")).join("\n")+"\n"; const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`founder_radar_v3_${state.tab}.csv`; a.click(); URL.revokeObjectURL(url)}
    document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));btn.classList.add("active");state.tab=btn.dataset.tab;render()})); $("search").addEventListener("input",e=>{state.query=e.target.value;render()}); ["levelFilter","directionFilter","statusFilter","sourceFilter","parentFilter"].forEach(id=>$(id).addEventListener("change",e=>{state[id.replace("Filter","")]=e.target.value;render()})); $("downloadBtn").addEventListener("click",downloadCsv); initMetrics(); initFilters(); render();
  </script>
</body>
</html>
